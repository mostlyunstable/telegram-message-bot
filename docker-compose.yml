version: "3.9"

services:
  dashboard:
    build: .
    container_name: armedias_dashboard
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      # Persist sessions and logs across container restarts
      - ./sessions:/app/sessions
      - ./logs:/app/logs
      - ./config.json:/app/config.json
      - ./targets.txt:/app/targets.txt
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - SECRET_KEY=${SECRET_KEY:-change_this_secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
